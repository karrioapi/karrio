apiVersion: v1
kind: Service
metadata:
  name: {{ include "karrio.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "karrio.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: ClusterIP
  ports:
    - port: 3002
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "karrio.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
