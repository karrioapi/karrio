apiVersion: v1
kind: Pod
metadata:
  name: {{ include "karrio.fullname" . }}-test-connection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "karrio.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      command:
        - /bin/sh
        - -ec
        - |
          # Use `curl --fail` so any non-2xx status exits non-zero and the
          # helm test reports failure. The `/v1/references` endpoint is
          # the same health path wired into the API Deployment probes —
          # it returns a small JSON document with feature flags / versions
          # and requires no auth, so it is a safe smoke-test target.
          curl --fail --silent --show-error --max-time 15 \
            "http://{{ include "karrio.fullname" . }}-api:5002/v1/references" \
            > /dev/null
