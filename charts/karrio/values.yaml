## Karrio Helm Chart — values.yaml
## https://karrio.io

nameOverride: ""
fullnameOverride: ""

image:
  server:
    repository: karrio.docker.scarf.sh/karrio/server
    tag: ""           # defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent
  dashboard:
    repository: karrio.docker.scarf.sh/karrio/dashboard
    tag: ""
    pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

## ──────────────────────────────────────────────
## API (Django)
## ──────────────────────────────────────────────
api:
  replicaCount: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 5
  readinessProbe:
    initialDelaySeconds: 60
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 3
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

## ──────────────────────────────────────────────
## Worker (Celery / Huey)
## ──────────────────────────────────────────────
worker:
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  livenessProbe:
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 15
    failureThreshold: 5
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  ## Worker autoscaling (requires a custom queue-depth metric — see
  ## templates/worker/hpa.yaml). Leave disabled until the metric source
  ## is registered with the Kubernetes metrics API.
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    # Optional CPU fallback for installs without the custom metric
    targetCPUUtilizationPercentage: null
    # Custom metric (e.g. karrio_queue_depth exposed via Prometheus Adapter)
    targetMetricName: ""
    targetValue: ""

## ──────────────────────────────────────────────
## Dashboard (Next.js)
## ──────────────────────────────────────────────
dashboard:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}

## ──────────────────────────────────────────────
## Ingress
##
## `className` examples:
##   - `alb`     (AWS Load Balancer Controller — see values-examples/eks-alb.yaml)
##   - `gce`     (GKE GCE Ingress             — see values-examples/gke.yaml)
##   - `nginx`   (ingress-nginx, default)
##   - `traefik` (Traefik Kubernetes Provider)
## ──────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations: {}
  api:
    host: api.example.com
  dashboard:
    host: app.example.com
  tls: []
  #  - secretName: karrio-tls
  #    hosts:
  #      - api.example.com
  #      - app.example.com

## ──────────────────────────────────────────────
## Application config (non-secret)
## ──────────────────────────────────────────────
config:
  secretKey: ""           # required — Django SECRET_KEY
  jwtSecret: ""           # required — NEXTAUTH_SECRET for dashboard
  debugMode: "False"
  useHttps: "True"
  detachedWorker: "True"
  enableAllPlugins: "True"

## ──────────────────────────────────────────────
## External PostgreSQL (managed RDS / CloudSQL / self-hosted)
##
## Leave `postgresql.enabled` at `false` (default) and fill `database.*`
## below to point the chart at an existing Postgres instance. Set
## `postgresql.enabled: true` to pull in the Bitnami postgresql subchart
## instead (dev / smoke clusters only — subchart is not production-tuned).
## ──────────────────────────────────────────────
database:
  host: ""
  port: 5432
  name: karrio
  username: karrio
  password: ""            # required — provide via --set or existingSecret

## ──────────────────────────────────────────────
## External Redis (managed ElastiCache / MemoryStore / self-hosted)
##
## Same pattern as postgresql above: default is external. Set
## `redis.enabled: true` to pull in the Bitnami redis subchart. When the
## subchart is enabled the chart-level `redis.host` / `redis.port` values
## are still consumed by the ConfigMap — override them to match the
## subchart's service DNS (e.g. `<release>-redis-master`) or leave blank
## and set via `--set redis.host=...` at install time.
## ──────────────────────────────────────────────
redis:
  enabled: false
  host: ""
  port: 6379
  ## Bitnami redis subchart values (only consumed when redis.enabled=true).
  ## See https://github.com/bitnami/charts/tree/main/bitnami/redis for the
  ## full schema.
  auth:
    enabled: false
  architecture: standalone

## ──────────────────────────────────────────────
## Bitnami postgresql subchart toggle (dev clusters only).
## See https://github.com/bitnami/charts/tree/main/bitnami/postgresql.
## ──────────────────────────────────────────────
postgresql:
  enabled: false
  auth:
    username: karrio
    database: karrio
    # password must be supplied via --set or existingSecret; never commit
    postgresPassword: ""
    password: ""

## ──────────────────────────────────────────────
## Use an existing Secret instead of creating one
## Must contain keys: SECRET_KEY, JWT_SECRET, DATABASE_PASSWORD
## ──────────────────────────────────────────────
existingSecret: ""

## ──────────────────────────────────────────────
## Dashboard public URLs
## ──────────────────────────────────────────────
dashboardUrl: ""          # e.g. https://app.example.com
karrioPublicUrl: ""       # e.g. https://api.example.com
