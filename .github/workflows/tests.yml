# Python testing with uv, pip/venv caching, PostgreSQL parallel tests
# Optimisations applied:
#   - uv for dep install (10-100x faster than pip)
#   - venv cached by requirements hash (skips install on cache hit)
#   - PostgreSQL service for server-tests → enables --parallel
#   - npm cache for dashboard-ci
#   - actions/checkout@v4 + shallow submodule fetch

name: karrio-tests

on: [push]

jobs:
  sdk-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout submodules (shallow)
        run: git submodule update --init --depth=1 community

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: |
            requirements.sdk.dev.txt
            **/pyproject.toml

      - name: Cache SDK venv
        id: sdk-venv-cache
        uses: actions/cache@v4
        with:
          path: .venv/sdk
          key: sdk-venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('requirements.sdk.dev.txt', 'modules/connectors/**/pyproject.toml', 'modules/sdk/**/pyproject.toml') }}
          restore-keys: |
            sdk-venv-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Setup SDK env
        run: |
          ./bin/setup-sdk-env -v
        env:
          UV_SYSTEM_PYTHON: "0"

      - name: Run SDK typechecks
        run: ./bin/run-sdk-typecheck -v

      - name: Run SDK tests
        run: ./bin/run-sdk-tests -v

  server-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: karrio
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout submodules (shallow)
        run: git submodule update --init --depth=1 community

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: |
            requirements.server.dev.txt
            requirements.sdk.dev.txt
            **/pyproject.toml

      - name: Cache server venv
        id: server-venv-cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: server-venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('requirements.server.dev.txt', 'requirements.sdk.dev.txt', 'modules/**/pyproject.toml', 'apps/**/pyproject.toml') }}
          restore-keys: |
            server-venv-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Setup server env
        run: ./bin/setup-server-env -v

      - name: Run migrations
        env:
          DATABASE_ENGINE: postgresql
          DATABASE_NAME: karrio
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
          ENABLE_ALL_PLUGINS_BY_DEFAULT: "true"
        run: ./bin/migrate

      - name: Run server tests
        env:
          DATABASE_ENGINE: postgresql
          DATABASE_NAME: karrio
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
          ENABLE_ALL_PLUGINS_BY_DEFAULT: "true"
        run: ./bin/run-server-tests -v

  dashbaord-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout submodules (shallow)
        run: git submodule update --init --depth=1 community

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        run: |
          npm install -g corepack
          mkdir -p ~/.volta/bin
          corepack enable --install-directory ~/.volta/bin

      - name: Test Build
        run: |
          npm ci
          npm run build -w apps/dashboard
